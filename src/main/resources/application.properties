spring.application.name=MechanicApp

spring.jpa.properties.hibernate.dialect =org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.auto-commit=false
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


#server.servlet.context-path =/api/vi

# Oauth2 for google
spring.security.oauth2.client.registration.google.client-id =${SPRING_SECURITY_OAUTH2_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret =${SPRING_SECURITY_OAUTH2_CLIENT_SECRET}




# Mail configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=${}
spring.mail.username=${}
spring.mail.password=${}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

spring.jpa.hibernate.ddl-auto=update


steps:
  # 1️⃣ Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'asia-south1-docker.pkg.dev/mechanic-finder-481008/mechanic-repo/mechanicapp-image:latest',
        '.'
      ]

  # 2️⃣ Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'asia-south1-docker.pkg.dev/mechanic-finder-481008/mechanic-repo/mechanicapp-image:latest'
      ]

  # 3️⃣ Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'mechanicapp-service',
        '--image',
        'asia-south1-docker.pkg.dev/mechanic-finder-481008/mechanic-repo/mechanicapp-image:latest',
        '--region',
        'asia-south1',
        '--platform',
        'managed',
        '--allow-unauthenticated'
      ]

# Optional: declare the image so Cloud Build can track it
images:
  - asia-south1-docker.pkg.dev/mechanic-finder-481008/mechanic-repo/mechanicapp-image:latest

# ✅ Add logging option to fix service account error
options:
  logging: CLOUD_LOGGING_ONLY
